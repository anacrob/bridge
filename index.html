<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Manager - ANACROB</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0ede8; --surface:#faf8f5; --card:#fff; --border:#e2dcd4;
    --blue:#2145a0; --blue-l:#3a63c8; --blue-bg:#e8edf8;
    --sage:#8aab8e; --text:#3a3530; --text-m:#7a7068; --text-l:#b0a89e; --r:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);min-height:100vh;font-family:'Nunito',sans-serif;color:var(--text);padding:15px;}
  .container{max-width:680px;margin:0 auto;}
  
  /* Header */
  header{background:var(--card);border-bottom:2px solid var(--blue-bg);padding:20px;text-align:center;border-radius:20px;margin-bottom:15px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--blue);}
  
  /* Admin Panel */
  .admin-bar{background:#2c3e50;color:white;border-radius:var(--r);padding:20px;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
  .admin-title{font-size:12px;font-weight:800;color:#d4af37;text-transform:uppercase;margin-bottom:15px;display:flex;justify-content:space-between;}
  
  .link-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px;margin-bottom:10px;}
  .link-label{font-size:10px;font-weight:700;color:#bdc3c7;margin-bottom:5px;display:block;}
  .link-row{display:flex;gap:8px;align-items:center;}
  .link-url{flex:1;font-size:11px;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;}
  .copy-mini{background:var(--blue);color:white;border:none;padding:5px 10px;border-radius:5px;font-size:10px;cursor:pointer;}

  .admin-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px;}
  .ab{flex:1;min-width:140px;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--surface);color:var(--text-m);}
  .ab.wa{background:#25d366;color:white;}
  .ab.new{background:var(--blue);color:white;}

  /* UI Elements */
  .status-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:15px;}
  .prog-track{height:8px;background:var(--border);border-radius:10px;margin-top:10px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--blue);width:0%;transition:width 0.5s;}
  
  .lists-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:15px;}
  .list-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;}
  .reg-item{display:flex;justify-content:space-between;padding:8px;background:var(--surface);border-radius:8px;margin-bottom:5px;font-size:13px;}
  .del-btn{color:#e74c3c;background:none;border:none;font-weight:800;cursor:pointer;padding:0 5px;}
  
  .form-card{background:var(--card);padding:20px;border-radius:var(--r);border:1px solid var(--border);}
  input{width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1.5px solid var(--border);font-family:inherit;}
  .submit-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;}

  .overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:100;display:flex;align-items:center;justify-content:center;}
  .hidden{display:none !important;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;display:none;}
</style>
</head>
<body>

<div id="loadingOverlay" class="overlay"><b>Caricamento...</b></div>

<div id="setupOverlay" class="overlay hidden">
  <div style="background:white;padding:30px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);max-width:400px;width:90%;">
    <h2 style="margin-bottom:15px;font-family:serif">Nuovo Torneo</h2>
    <input type="text" id="sTitle" placeholder="Titolo (es. Torneo del Lunedì)">
    <input type="text" id="sDate" placeholder="Data e Ora (es. 25 Marzo ore 21)">
    <input type="number" id="sMax" value="8" placeholder="Max Coppie">
    <button class="submit-btn" onclick="launch()">CREA TORNEO</button>
  </div>
</div>

<div class="container">
  <header>
    <h1><small style="display:block;font-size:12px;text-transform:uppercase;color:var(--text-m)">Bridge Manager</small><span id="hTitle">---</span></h1>
    <p id="hDate" style="color:var(--blue);font-weight:700;margin-top:5px"></p>
  </header>

  <div id="adminBar" class="admin-bar hidden">
    <div class="admin-title">⚙️ Gestione Organizzatore (<span id="adminName"></span>)</div>
    
    <div class="link-box">
      <span class="link-label">🔗 LINK ORGANIZZATORE (Salva questo nei preferiti)</span>
      <div class="link-row">
        <div class="link-url" id="urlAdmin">---</div>
        <button class="copy-mini" onclick="copyText('urlAdmin')">COPIA</button>
      </div>
    </div>

    <div class="link-box">
      <span class="link-label">👥 LINK PARTECIPANTI (Da inviare ai soci)</span>
      <div class="link-row">
        <div class="link-url" id="urlUser">---</div>
        <button class="copy-mini" onclick="copyText('urlUser')">COPIA</button>
      </div>
    </div>

    <div class="admin-btns">
      <button class="ab wa" onclick="copyInvite()">📋 COPIA INVITO WA</button>
      <button class="ab" onclick="copyList()">📋 COPIA LISTA</button>
      <button class="ab new" onclick="show('setupOverlay')">🔄 NUOVO TORNEO</button>
    </div>
  </div>

  <div class="status-bar">
    <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800">
      <span>ISCRITTI</span>
      <span id="cCountDisplay">0 / 0 COPPIE</span>
    </div>
    <div class="prog-track"><div id="progFill" class="prog-fill"></div></div>
  </div>

  <div class="lists-grid">
    <div class="list-card"><h3>👫 Coppie</h3><div id="cList" style="margin-top:10px"></div></div>
    <div class="list-card"><h3>🙋 Singoli</h3><div id="sList" style="margin-top:10px"></div></div>
  </div>

  <div class="form-card" id="formCard">
    <h3 style="margin-bottom:10px;font-size:15px">Iscrizione:</h3>
    <input type="text" id="n1" placeholder="Nome Giocatore 1">
    <input type="text" id="n2" placeholder="Nome Giocatore 2 (opzionale)">
    <button class="submit-btn" onclick="register()">CONFERMA ISCRIZIONE</button>
  </div>
</div>

<div id="toast" class="toast">Copiato!</div>

<script>
const MASTER_KEY = '$2a$10$1qayBZ95jStLXaEK5ql6pOfEsL2lCZI9Zo6tu7.u0kko0C.DNEv16';
const ADMIN_LIST = { 'GK020160': 'ANACROB', 'Kial$$44': 'ASSISTENTE' };
const JBASE = 'https://api.jsonbin.io/v3/b';
const MYCODE = localStorage.getItem('br_code_v7') || Math.random().toString(36).slice(2,10);
localStorage.setItem('br_code_v7', MYCODE);

let BIN_ID, isAdmin=false, regs=[], MAX=8, curPw='';

(async () => {
  const p = new URLSearchParams(location.search);
  curPw = p.get('admin');
  BIN_ID = p.get('bin');
  const userMode = p.get('user') === 'anacrob';

  if (curPw && ADMIN_LIST[curPw]) {
    isAdmin = true;
    document.getElementById('adminBar').classList.remove('hidden');
    document.getElementById('adminName').textContent = ADMIN_LIST[curPw];
    if (!BIN_ID) BIN_ID = localStorage.getItem('last_bin_' + curPw);
    if (!BIN_ID) { hide('loadingOverlay'); show('setupOverlay'); return; }
  } else if (!userMode || !BIN_ID) {
    document.body.innerHTML = "<div style='text-align:center;padding:50px'><h2>Accesso Negato</h2><p>Usa il link corretto.</p></div>";
    return;
  }

  // Genera i link per il pannello
  const baseUrl = location.origin + location.pathname;
  document.getElementById('urlAdmin').textContent = `${baseUrl}?admin=${curPw}&bin=${BIN_ID}`;
  document.getElementById('urlUser').textContent = `${baseUrl}?user=anacrob&bin=${BIN_ID}`;

  if (isAdmin) localStorage.setItem('last_bin_' + curPw, BIN_ID);
  await load();
  hide('loadingOverlay');
  setInterval(load, 20000);
})();

async function load() {
  try {
    const r = await fetch(`${JBASE}/${BIN_ID}/latest`, {headers:{'X-Master-Key':MASTER_KEY}});
    const d = await r.json();
    regs = d.record.registrations || [];
    MAX = d.record.meta.maxCoppie || 8;
    document.getElementById('hTitle').textContent = d.record.meta.title;
    document.getElementById('hDate').textContent = d.record.meta.date;
    render();
  } catch(e) {}
}

function render() {
  const cp = regs.filter(r => r.n2);
  const sg = regs.filter(r => !r.n2);
  document.getElementById('cCountDisplay').textContent = `${cp.length} / ${MAX} COPPIE`;
  document.getElementById('progFill').style.width = (cp.length/MAX*100)+'%';

  const cl = document.getElementById('cList'); cl.innerHTML = '';
  cp.forEach((r, i) => {
    cl.innerHTML += `<div class="reg-item"><span><b>${i+1}.</b> ${r.n1} - ${r.n2}</span> ${isAdmin?`<button class="del-btn" onclick="del(${regs.indexOf(r)})">×</button>`:''}</div>`;
  });
  const sl = document.getElementById('sList'); sl.innerHTML = '';
  sg.forEach((r) => {
    sl.innerHTML += `<div class="reg-item"><span>• ${r.n1}</span> ${isAdmin?`<button class="del-btn" onclick="del(${regs.indexOf(r)})">×</button>`:''}</div>`;
  });
}

async function launch() {
  const meta = { title: document.getElementById('sTitle').value || 'Torneo Bridge', date: document.getElementById('sDate').value || '-', maxCoppie: parseInt(document.getElementById('sMax').value) || 8 };
  const r = await fetch(JBASE, { method:'POST', headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY}, body:JSON.stringify({registrations:[], meta}) });
  const d = await r.json();
  location.href = `?admin=${curPw}&bin=${d.metadata.id}`;
}

async function register() {
  const n1 = document.getElementById('n1').value.trim();
  const n2 = document.getElementById('n2').value.trim();
  if(!n1) return;
  regs.push({ n1, n2, code: MYCODE });
  await save();
  document.getElementById('n1').value=''; document.getElementById('n2').value='';
}

async function del(idx) { if(confirm("Rimuovere?")) { regs.splice(idx,1); await save(); } }

async function save() {
  await fetch(`${JBASE}/${BIN_ID}`, { method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY}, body:JSON.stringify({registrations:regs, meta:{title:document.getElementById('hTitle').textContent, date:document.getElementById('hDate').textContent, maxCoppie:MAX}}) });
  render();
}

function copyText(id) {
  const t = document.getElementById(id).textContent;
  navigator.clipboard.writeText(t);
  showToast("Link copiato!");
}

function copyInvite() {
  const url = document.getElementById('urlUser').textContent;
  const txt = `🃏 *${document.getElementById('hTitle').textContent}*\n📅 ${document.getElementById('hDate').textContent}\n\nIscriviti qui:\n${url}`;
  navigator.clipboard.writeText(txt);
  showToast("Invito WA copiato!");
}

function copyList() {
  let txt = `🃏 LISTA ${document.getElementById('hTitle').textContent}\n\n`;
  regs.filter(r=>r.n2).forEach((r,i) => txt += `${i+1}. ${r.n1} & ${r.n2}\n`);
  navigator.clipboard.writeText(txt);
  showToast("Lista copiata!");
}

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}
</script>
</body>
</html>
