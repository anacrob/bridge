<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duplicato di Bridge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0ede8; --surface:#faf8f5; --card:#fff; --border:#e2dcd4;
    --blue:#2145a0; --blue-l:#3a63c8; --blue-bg:#e8edf8;
    --sage:#8aab8e; --sage-bg:#eaf2eb;
    --blush:#c4847a; --blush-l:#e8b8b2; --blush-bg:#fceeed;
    --slate:#7a8fa6; --slate-bg:#eaf0f6;
    --sand:#b89a6e; --sand-bg:#f8f2e8;
    --text:#3a3530; --text-m:#7a7068; --text-l:#b0a89e;
    --r:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);min-height:100vh;font-family:'Nunito',sans-serif;color:var(--text);
    background-image:radial-gradient(circle at 15% 15%,rgba(33,69,160,.06) 0%,transparent 45%),
    radial-gradient(circle at 85% 80%,rgba(196,132,122,.09) 0%,transparent 45%);}

  .overlay{position:fixed;inset:0;background:rgba(240,237,232,.97);backdrop-filter:blur(4px);
    z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
  .overlay.hidden{display:none;}
  .hidden{display:none !important;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:32px 28px;max-width:440px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.08);}
  .modal h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--blue);margin-bottom:4px;}
  .modal .sub{font-size:12px;color:var(--text-l);margin-bottom:22px;}

  .field{margin-bottom:13px;}
  .field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:4px;}
  .field input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;}

  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;margin-top:6px;}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-ghost{background:var(--surface);color:var(--text-m);border:1.5px solid var(--border);}
  .btn-danger{background:var(--blush);color:#fff;}

  header{background:var(--card);border-bottom:2px solid var(--blue-bg);padding:26px 24px 20px;text-align:center;}
  h1{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--blue);}
  h1 small{display:block;font-size:.5em;color:var(--text-m);text-transform:uppercase;}

  .container{max-width:680px;margin:0 auto;padding:22px 16px 60px;}
  .admin-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;}
  .admin-btns{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .ab{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-m);}
  .ab.wa{background:#25d366;color:white;border:none;}

  .status-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:14px;}
  .prog-track{height:7px;background:var(--border);border-radius:99px;margin-top:10px;}
  .prog-fill{height:100%;background:var(--blue);width:0%;transition:width .5s;}

  .lists-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  @media(max-width:480px){.lists-grid{grid-template-columns:1fr;}}
  .list-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;}
  .reg-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;margin-bottom:4px;background:var(--surface);font-size:13px;}
  .reg-item.mine{background:var(--blue-bg);border:1px solid rgba(33,69,160,.15);}
  .empty-slot{padding:6px 9px;border:1.5px dashed var(--border);border-radius:7px;margin-bottom:4px;font-size:12px;color:var(--text-l);font-style:italic;}

  .form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px;}
  .submit-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
  
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:11px 22px;border-radius:99px;font-size:13px;transition:transform .3s;z-index:300;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="overlay" id="loadingOverlay"><p>Caricamento…</p></div>

<div class="overlay hidden" id="setupOverlay">
  <div class="modal">
    <h2>Nuovo torneo</h2>
    <div class="field"><label>Nome evento</label><input type="text" id="sTitle" value="Duplicato di Bridge"></div>
    <div class="field"><label>Data</label><input type="date" id="sDate"></div>
    <div class="field"><label>Numero coppie (max)</label><input type="number" id="sMaxCoppie" value="4"></div>
    <button class="btn btn-blue" onclick="launch()">Crea torneo →</button>
  </div>
</div>

<header>
  <h1><small>Torneo</small><span id="hTitle">—</span></h1>
  <p id="mDateTxt" style="font-size:14px;color:var(--text-m)"></p>
</header>

<div class="container">
  <div class="admin-bar" id="adminBar" style="display:none">
    <div style="font-size:11px;font-weight:800;color:var(--blue);margin-bottom:8px">⚙️ PANNELLO ADMIN (<span id="adminName"></span>)</div>
    <div class="admin-btns">
      <button class="ab wa" onclick="copyInvite()">📋 COPIA INVITO WA</button>
      <button class="ab" onclick="copyList()">📋 COPIA LISTA ISCRITTI</button>
      <button class="ab" onclick="show('setupOverlay')">🔄 NUOVO TORNEO</button>
      <button class="ab" style="color:red" onclick="doReset()">↺ RESET LISTA</button>
    </div>
  </div>

  <div class="status-bar">
    <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800">
      <span>ISCRIZIONI</span>
      <span><span id="cCount">0</span> / <span id="cMax">0</span> COPPIE</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div class="lists-grid">
    <div class="list-card"><h3>👫 Coppie</h3><div id="cList"></div></div>
    <div class="list-card"><h3>🙋 Singoli</h3><div id="sList"></div></div>
  </div>

  <div class="form-card" id="formCard">
    <input type="text" id="n1" placeholder="Nome Giocatore 1" style="width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1.5px solid var(--border)">
    <input type="text" id="n2" placeholder="Nome Giocatore 2 (opzionale)" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1.5px solid var(--border)">
    <button class="submit-btn" onclick="register()">CONFERMA ISCRIZIONE</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MASTER_KEY = '$2a$10$1qayBZ95jStLXaEK5ql6pOfEsL2lCZI9Zo6tu7.u0kko0C.DNEv16';
const ACCESS_KEY = '$2a$10$meqPLCGo48xs4Me.qNnIUefaCedxyQ0Bgpi7OcAcBqG.aNPILz6lC';
const ADMIN_LIST = { 'GK020160': 'ANACROB', 'Kial$$44': 'ASSISTENTE' };
const JBASE = 'https://api.jsonbin.io/v3/b';
const MYCODE = localStorage.getItem('br_code') || Math.random().toString(36).slice(2,10);
localStorage.setItem('br_code', MYCODE);

let BIN_ID, isAdmin=false, regs=[], MAX=4, curAdminPw='';

(async () => {
  const p = new URLSearchParams(location.search);
  curAdminPw = p.get('admin');
  const userPw = p.get('user');
  BIN_ID = p.get('bin');

  if (curAdminPw && ADMIN_LIST[curAdminPw]) {
    isAdmin = true;
    document.getElementById('adminBar').style.display = 'block';
    document.getElementById('adminName').textContent = ADMIN_LIST[curAdminPw];
    if (!BIN_ID) BIN_ID = localStorage.getItem('last_bin_' + curAdminPw);
    if (!BIN_ID) { hide('loadingOverlay'); show('setupOverlay'); return; }
  } else if (userPw !== 'anacrob' || !BIN_ID) {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>Accesso Negato</h2>";
    return;
  }

  if (isAdmin) localStorage.setItem('last_bin_' + curAdminPw, BIN_ID);
  await load();
  hide('loadingOverlay');
  setInterval(load, 20000);
})();

async function load() {
  try {
    const r = await fetch(`${JBASE}/${BIN_ID}/latest`, {headers:{'X-Master-Key':MASTER_KEY}});
    const data = await r.json();
    regs = data.record.registrations || [];
    MAX = data.record.meta.maxCoppie || 4;
    document.getElementById('hTitle').textContent = data.record.meta.title;
    document.getElementById('mDateTxt').textContent = data.record.meta.date;
    render();
  } catch(e) {}
}

function render() {
  const cp = regs.filter(r => r.n2);
  const sg = regs.filter(r => !r.n2);
  document.getElementById('cCount').textContent = cp.length;
  document.getElementById('cMax').textContent = MAX;
  document.getElementById('progFill').style.width = (cp.length/MAX*100)+'%';

  const cl = document.getElementById('cList'); cl.innerHTML = '';
  cp.forEach((r, i) => {
    cl.innerHTML += `<div class="reg-item ${r.code===MYCODE?'mine':''}"><b>${i+1}.</b> ${r.n1} & ${r.n2} ${isAdmin?`<button onclick="del(${regs.indexOf(r)})">×</button>`:''}</div>`;
  });
  for(let i=cp.length; i<MAX; i++) cl.innerHTML += `<div class="empty-slot">Libero</div>`;

  const sl = document.getElementById('sList'); sl.innerHTML = '';
  sg.forEach((r) => {
    sl.innerHTML += `<div class="reg-item ${r.code===MYCODE?'mine':''}">• ${r.n1} ${isAdmin?`<button onclick="del(${regs.indexOf(r)})">×</button>`:''}</div>`;
  });
}

async function launch() {
  const meta = { title: document.getElementById('sTitle').value, date: document.getElementById('sDate').value, maxCoppie: parseInt(document.getElementById('sMaxCoppie').value) };
  const r = await fetch(JBASE, { method:'POST', headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY}, body:JSON.stringify({registrations:[], meta}) });
  const data = await r.json();
  location.href = `?admin=${curAdminPw}&bin=${data.metadata.id}`;
}

async function register() {
  const n1 = document.getElementById('n1').value.trim();
  const n2 = document.getElementById('n2').value.trim();
  if(!n1) return;
  regs.push({ n1, n2, code: MYCODE });
  await save();
  document.getElementById('n1').value=''; document.getElementById('n2').value='';
}

async function del(idx) { if(confirm("Rimuovere?")) { regs.splice(idx,1); await save(); } }
async function doReset() { if(confirm("Azzerare?")) { regs=[]; await save(); } }

async function save() {
  const r = await fetch(`${JBASE}/${BIN_ID}/latest`, {headers:{'X-Master-Key':MASTER_KEY}});
  const data = await r.json();
  data.record.registrations = regs;
  await fetch(`${JBASE}/${BIN_ID}`, { method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':MASTER_KEY}, body:JSON.stringify(data.record) });
  render();
}

function copyInvite() {
  const url = `${location.origin}${location.pathname}?user=anacrob&bin=${BIN_ID}`;
  const txt = `🃏 *${document.getElementById('hTitle').textContent}*\n📅 ${document.getElementById('mDateTxt').textContent}\n\nPer iscrivervi cliccate qui:\n${url}`;
  copyToClipboard(txt, "Invito copiato! Incollalo su WhatsApp.");
}

function copyList() {
  const cp = regs.filter(r => r.n2);
  const sg = regs.filter(r => !r.n2);
  let txt = `🃏 LISTA ${document.getElementById('hTitle').textContent}\n\n👫 COPPIE:\n`;
  cp.forEach((r,i) => txt += `${i+1}. ${r.n1} & ${r.n2}\n`);
  txt += `\n🙋 SINGOLI:\n`;
  sg.forEach(r => txt += `• ${r.n1}\n`);
  copyToClipboard(txt, "Lista copiata! Incollala su WhatsApp.");
}

function copyToClipboard(text, msg) {
  const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
  toast(msg);
}

function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}
</script>
</body>
</html>
