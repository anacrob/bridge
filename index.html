<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANACROB BRIDGE - Prenotazioni</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a472a; /* Verde Tavolo da Gioco */
    --accent: #d4af37;  /* Oro */
    --bg: #f4f7f6;
    --card: #ffffff;
    --text: #2c3e50;
    --red: #e74c3c;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); padding: 20px 15px; }
  .container { max-width: 500px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 30px; padding: 25px; background: var(--primary); border-radius: 15px; color: white; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  header::after { content: '♠ ♥ ♦ ♣'; position: absolute; bottom: -5px; opacity: 0.15; font-size: 35px; width: 100%; left: 0; letter-spacing: 15px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; letter-spacing: 1px; margin-bottom: 5px; }
  .event-meta { font-size: 14px; color: var(--accent); font-weight: 600; text-transform: uppercase; }

  .status-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; border-top: 4px solid var(--accent); }
  .count-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .progress-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); transition: 0.5s; width: 0%; }

  .form-card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .input-group { margin-bottom: 15px; }
  label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: #7f8c8d; }
  input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; transition: 0.3s; }
  input:focus { border-color: var(--primary); outline: none; }
  .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }

  .list-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: var(--shadow); }
  .player-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; animation: fadeIn 0.3s ease; }
  .player-row:last-child { border: none; }
  .player-num { width: 30px; font-weight: 700; color: var(--accent); }
  .player-name { flex: 1; font-weight: 500; font-size: 15px; }
  .del-btn { color: #dcdcdc; border: none; background: none; font-size: 22px; cursor: pointer; transition: 0.2s; padding: 0 5px; }
  .del-btn:hover { color: var(--red); }

  .admin-box { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 12px; }
  .admin-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .btn-s { padding: 8px 12px; font-size: 11px; cursor: pointer; border-radius: 6px; border: none; font-weight: 600; background: #34495e; color: white; }

  .hidden { display: none; }
  .overlay { position: fixed; inset:0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(3px); }
  .modal { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="setupModal" class="overlay hidden">
  <div class="modal">
    <h2 style="margin-bottom: 20px; font-family: 'Playfair Display', serif; color: var(--primary);">Nuovo Torneo</h2>
    <div class="input-group"><label>Titolo Evento</label><input type="text" id="mTitle" value="TORNEO DI BRIDGE"></div>
    <div class="input-group"><label>Data e Ora</label><input type="text" id="mDate" placeholder="es. Lunedì 24 ore 21:00"></div>
    <div class="input-group"><label>Max Coppie</label><input type="number" id="mMax" value="16"></div>
    <button class="btn" onclick="initProject()">Crea Torneo →</button>
    <button class="btn-s" style="width:100%; margin-top:10px; background:none; color:#777" onclick="hideSetup()">Annulla</button>
  </div>
</div>

<div class="container">
  <header>
    <h1 id="viewTitle">Caricamento...</h1>
    <div id="viewMeta" class="event-meta">---</div>
  </header>

  <div id="adminPanel" class="admin-box hidden">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <strong>⚙️ PANNELLO ORGANIZZATORE</strong>
        <span id="adminName" style="color:var(--accent); font-weight:bold; font-size:10px"></span>
    </div>
    <div id="shareLink" style="font-family: monospace; font-size: 10px; margin: 8px 0; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 5px; word-break: break-all;"></div>
    <div class="admin-btns">
      <button class="btn-s" onclick="copyShare()">📋 Copia Link Soci</button>
      <button class="btn-s" style="background:var(--accent); color:#000" onclick="showSetup()">🔄 Cambia Torneo</button>
      <button class="btn-s" style="background:var(--red); color:white" onclick="resetRegs()">🗑️ Reset Iscritti</button>
    </div>
  </div>

  <div class="status-card">
    <div class="count-row">
      <span style="font-size: 12px; font-weight: 700; color: #7f8c8d;">RIEMPIMENTO TAVOLI</span>
      <span id="counter" style="color: var(--primary); font-weight: 800; font-size: 18px;">0 / 0</span>
    </div>
    <div class="progress-bar"><div id="progFill" class="progress-fill"></div></div>
  </div>

  <div id="regForm" class="form-card">
    <div class="input-group">
      <label>Nomi della Coppia</label>
      <input type="text" id="playerName" placeholder="es. Rossi - Bianchi" oninput="checkInput()">
    </div>
    <button id="subBtn" class="btn" onclick="addMe()" disabled>Conferma Iscrizione</button>
  </div>

  <div class="list-card">
    <h3 style="margin-bottom: 15px; font-size: 16px; display: flex; align-items: center; gap: 10px;">
        <span style="color:var(--primary)">♠</span> Lista Iscritti
    </h3>
    <div id="playerList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCH-0NeAPVShAcqBWLohT0q9JJOBYitW5k",
  authDomain: "duplicato-anacrob.firebaseapp.com",
  databaseURL: "https://duplicato-anacrob-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "duplicato-anacrob",
  storageBucket: "duplicato-anacrob.firebasestorage.app",
  messagingSenderId: "679147717441",
  appId: "1:679147717441:web:1d0a8a938a14d0f50c57c0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const userPass = params.get('admin');

// CONFIGURAZIONE DOPPIO ADMIN
const admins = {
    'GK020160': 'Anacrob',
    'Kial$$44': 'Secondo Admin'
};
const isAdmin = admins.hasOwnProperty(userPass);

let currentBin = params.get('bin') || localStorage.getItem('bridge_bin');
let players = [];
let maxP = 16;

if (isAdmin) {
  document.getElementById('adminPanel').classList.remove('hidden');
  document.getElementById('adminName').innerText = admins[userPass].toUpperCase();
  if (!currentBin) showSetup();
}

if (currentBin) startSync();

function startSync() {
  db.ref('bridge_app/' + currentBin).on('value', (snap) => {
    const data = snap.val();
    if (data) {
      players = data.players || [];
      maxP = data.meta.max;
      updateUI(data.meta);
    }
  });
}

function updateUI(meta) {
  document.getElementById('viewTitle').innerText = meta.title;
  document.getElementById('viewMeta').innerText = meta.date;
  document.getElementById('counter').innerText = `${players.length} / ${maxP}`;
  document.getElementById('progFill').style.width = (players.length / maxP * 100) + '%';
  document.getElementById('shareLink').innerText = window.location.origin + window.location.pathname + '?bin=' + currentBin;
  
  const list = document.getElementById('playerList');
  list.innerHTML = players.length ? '' : '<p style="color:#aaa; font-style:italic; font-size:13px">Ancora nessuna coppia iscritta...</p>';
  
  players.forEach((p, idx) => {
    list.innerHTML += `<div class="player-row">
      <div class="player-num">${idx + 1}</div>
      <div class="player-name">${p}</div>
      ${isAdmin ? `<button class="del-btn" onclick="removePlayer(${idx})">×</button>` : ''}
    </div>`;
  });

  const formElement = document.getElementById('regForm');
  if (players.length >= maxP) {
    formElement.innerHTML = '<div style="text-align:center; color:var(--red); font-weight:700; padding:10px; border:2px dashed var(--red); border-radius:10px;">🔴 ISCRIZIONI CHIUSE: TORNEO COMPLETO</div>';
  }
}

async function initProject() {
  const newBin = 'BR' + Date.now();
  const meta = {
    title: document.getElementById('mTitle').value,
    date: document.getElementById('mDate').value,
    max: parseInt(document.getElementById('mMax').value)
  };
  await db.ref('bridge_app/' + newBin).set({ meta: meta, players: [] });
  localStorage.setItem('bridge_bin', newBin);
  window.location.href = `?admin=${userPass}&bin=${newBin}`;
}

async function addMe() {
  const input = document.getElementById('playerName');
  const name = input.value.trim();
  if (players.length < maxP && name.length >= 3) {
    players.push(name);
    await db.ref('bridge_app/' + currentBin + '/players').set(players);
    input.value = '';
    checkInput();
  }
}

async function removePlayer(idx) {
  if(confirm("Rimuovere questa coppia?")) {
    players.splice(idx, 1);
    await db.ref('bridge_app/' + currentBin + '/players').set(players);
  }
}

async function resetRegs() {
  if(confirm("ATTENZIONE: Azzerare tutti gli iscritti al torneo attuale?")) {
    await db.ref('bridge_app/' + currentBin + '/players').set([]);
  }
}

function checkInput() {
  document.getElementById('subBtn').disabled = document.getElementById('playerName').value.trim().length < 3;
}
function showSetup() { document.getElementById('setupModal').classList.remove('hidden'); }
function hideSetup() { document.getElementById('setupModal').classList.add('hidden'); }
function copyShare() {
  navigator.clipboard.writeText(document.getElementById('shareLink').innerText);
  alert("Link per i soci copiato negli appunti!");
}
</script>
</body>
</html>
